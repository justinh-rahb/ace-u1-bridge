# router.cfg — Klipper Router configuration for ace-u1-bridge
#
# Connects the U1 Klipper instance and ACE Klipper instance via
# JSON-RPC over Unix sockets. The router bridges events between them.
#
# Start with:
#   python3 ~/klipper-router/src/klipper_router.py \
#     -c /path/to/ace-u1-bridge/config/klipper-router/router.cfg

# ─── Snapmaker U1 Klipper instance ──────────────────────────────────────────
# The main printer. Runs Snapmaker's proprietary Klipper fork.
# Default socket path on U1: /tmp/klippy_uds
# Adjust if your U1 uses a different path.
[klippy u1]
sock: /tmp/klippy_uds
on_connect: M118 Router connected to U1

# ─── ACE Pro Klipper instance ───────────────────────────────────────────────
# The headless Klipper process running ace.py.
# Must match the -a flag used when starting the ACE klippy process.
[klippy ace]
sock: /tmp/klippy_ace_uds
on_connect: M118 Router connected to ACE instance
