# ace_instance.cfg — ACE Pro driver configuration for U1 integration
#
# This configures the ace Klipper extra to talk to the ACE Pro hardware
# over USB serial. Parameters are tuned for the Snapmaker U1 filament path.
#
# IMPORTANT: Measure and update the distance calibration values below
# after physical installation. See docs/COMMISSIONING.md Phase 5.
#
# ─── Serial port auto-discovery ───────────────────────────────────────────────
# The ACE driver finds your ACE unit(s) automatically by USB device description
# ("ACE" in the port name), sorted by USB topology. No serial path is configured
# here — plug in your ACE unit(s) and the driver discovers them.
#
# With ace_count: 2, the unit plugged into the lower-numbered USB root port
# becomes instance 0 (left feeder / T0+T1). The other becomes instance 1
# (right feeder / T2+T3). Control assignment by physical USB port placement.
#
# To verify detection before starting Klipper:
#   ls /dev/serial/by-id/          # should show Anycubic ACE entry
#   python3 -m serial.tools.list_ports --verbose | grep -i ace

# ─── ACE Pro virtual output pin (required by driver) ─────────────────────────
[output_pin ACE_Pro]
pin: virtual_pin:ace_pro
pwm: False
value: 1
shutdown_value: 0

# ─── ACE Pro driver — SINGLE UNIT (default) ──────────────────────────────────
# For one ACE Pro feeding all 4 toolheads (lane-per-head or 2+2 mode).
# Uncomment the [ace] block below for TWO units instead.
[ace]
ace_count: 1
baud: 115200

# Filament sensors — the ACE instance runs standalone (no physical extruder),
# so we don't have a real nozzle sensor. The U1 handles its own toolhead
# sensing via filament_feed modules.
filament_runout_sensor_name_nozzle: filament_runout_nozzle
#filament_runout_sensor_name_rdm: filament_runout_rdm  # uncomment if using RDM

# Feed assist — keep enabled so ACE motor assists during load/unload
feed_assist_active_after_ace_connect: True

# ─── Speed settings ──────────────────────────────────────────────────────────
feed_speed: 60                         # mm/s — ACE feed motor speed
retract_speed: 50                      # mm/s — ACE retract motor speed
incremental_feeding_length: 100        # mm — retry feed chunk size
incremental_feeding_speed: 60          # mm/s — retry feed speed

# ─── Distance calibration (U1-specific) ──────────────────────────────────────
# These MUST be measured after physical installation.
# See docs/COMMISSIONING.md Phase 5 and docs/BOWDEN_ROUTING.md.
#
# parkposition_to_toolhead_length:
#   Distance from ACE park position to U1 extruder gears.
#   = Bowden tube length (ACE output → U1 back panel) + ~950mm (U1 internal path)
#   Typical: 1200–1600mm depending on ACE placement.
#
# total_max_feeding_length:
#   Maximum feed distance before the driver errors. Must be >= full ACE→nozzle path.
#   Default 3000mm is generous — safe unless your path is exceptionally long.
#
# parkposition_to_rdm_length:
#   Distance from park to the Rear Detection Module sensor.
#   Set to 0 if no RDM (typical for U1 integration).
parkposition_to_toolhead_length: 1200  # CALIBRATE — see Phase 5
parkposition_to_rdm_length: 0          # no RDM sensor in U1 path
total_max_feeding_length: 3000         # safe default; adjust if path > 3m
toolchange_load_length: 2000           # max length for a single tool-change load

# ─── Toolhead parameters ─────────────────────────────────────────────────────
# The U1's own filament_feed system handles the last ~950mm.
# ACE only needs to deliver filament to the U1 back panel entry point.
toolhead_full_purge_length: 0          # U1 handles purging, not ACE
toolhead_slow_loading_speed: 5         # mm/s
toolhead_retraction_speed: 10          # mm/s
toolhead_retraction_length: 0          # U1 handles retraction from extruder
extruder_feeding_length: 0             # no extruder on ACE instance
extruder_feeding_speed: 5              # mm/s
pre_cut_retract_length: 0              # no tip cutting on ACE side

# ─── Purge (handled by U1, not ACE) ──────────────────────────────────────────
default_color_change_purge_length: 0
default_color_change_purge_speed: 300
purge_max_chunk_length: 250
purge_multiplier: 1.0

# ─── Monitoring ──────────────────────────────────────────────────────────────
ace_connection_supervision: True        # reconnect if ACE drops off USB
runout_debounce_count: 1               # debounce runout sensor triggers

# ─── Moonraker lane sync (optional) ──────────────────────────────────────────
# Enable if running Moonraker alongside the ACE instance for spool UI.
# Disabled by default — ACE instance is typically headless.
moonraker_lane_sync_enabled: False
#moonraker_lane_sync_url: http://127.0.0.1:7125
#moonraker_lane_sync_namespace: lane_data

# ─── ACE Pro driver — DUAL UNIT (two ACE units, one per feeder) ──────────────
# ALTERNATIVE to the single-unit [ace] section above. Comment out the
# single-unit block and uncomment this block to use two ACE Pro units,
# one feeding the U1 left feeder (T0+T1) and one feeding the right (T2+T3).
#
# Physical wiring:
#   ACE unit 0 → left feeder entry points (T0, T1)
#   ACE unit 1 → right feeder entry points (T2, T3)
#
# Global INDEX numbering with ace_count: 2:
#   ACE 0 slot 0 → INDEX 0 → T0 lane A
#   ACE 0 slot 1 → INDEX 1 → T0 lane B  (2+2 mode) or T1 lane A (1:1 mode)
#   ACE 0 slot 2 → INDEX 2 → T1 lane A  (2+2 mode) or T1 lane B (1:1 mode)
#   ACE 0 slot 3 → INDEX 3 → T1 lane B  (2+2 mode) or unused (1:1 mode)
#   ACE 1 slot 0 → INDEX 4 → T2 lane A
#   ACE 1 slot 1 → INDEX 5 → T2 lane B  (2+2 mode) or T3 lane A (1:1 mode)
#   ACE 1 slot 2 → INDEX 6 → T3 lane A  (2+2 mode) or T3 lane B (1:1 mode)
#   ACE 1 slot 3 → INDEX 7 → T3 lane B  (2+2 mode) or unused (1:1 mode)
#
# USB assignment: the ACE unit plugged into the lower-numbered USB root port
# becomes instance 0. Plug the left-feeder unit there first.
#
# Per-instance length overrides: if the two ACE units are at different
# distances from the U1, use the "global,instance_num:override" syntax.
# Example: "1200,1:1350" means instance 0 = 1200mm, instance 1 = 1350mm.
#
#[ace]
#ace_count: 2
#baud: 115200
#
#filament_runout_sensor_name_nozzle: filament_runout_nozzle
#feed_assist_active_after_ace_connect: True
#
#feed_speed: 60
#retract_speed: 50
#incremental_feeding_length: 100
#incremental_feeding_speed: 60
#
## Per-instance distance overrides (left feeder may differ from right)
#parkposition_to_toolhead_length: 1200     # same for both; or use "1200,1:1350"
#parkposition_to_rdm_length: 0
#total_max_feeding_length: 3000
#toolchange_load_length: 2000
#
#toolhead_full_purge_length: 0
#toolhead_slow_loading_speed: 5
#toolhead_retraction_speed: 10
#toolhead_retraction_length: 0
#extruder_feeding_length: 0
#extruder_feeding_speed: 5
#pre_cut_retract_length: 0
#
#default_color_change_purge_length: 0
#default_color_change_purge_speed: 300
#purge_max_chunk_length: 250
#purge_multiplier: 1.0
#
#ace_connection_supervision: True
#runout_debounce_count: 1
#moonraker_lane_sync_enabled: False

# ─── Filament sensors ────────────────────────────────────────────────────────
# The ACE driver expects these sensor names to exist. In a standalone ACE
# instance without a physical nozzle, we use virtual pins as stand-ins.
# Actual runout detection happens on the U1 side via filament_feed modules.

[filament_switch_sensor filament_runout_nozzle]
pause_on_runout: False
switch_pin: virtual_pin:filament_nozzle_pin
runout_gcode:
    ACE_RUNOUT_NOTIFY LANE=0
insert_gcode:

[output_pin filament_nozzle_pin]
pin: virtual_pin:filament_nozzle_sim
pwm: False
value: 0
