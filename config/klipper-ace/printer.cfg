# printer.cfg — Minimal Klipper instance for the ACE Pro
#
# This is NOT a real printer. It's a headless Klipper process that exists
# solely to run the ace.py extra (USB serial to ACE hardware) and respond
# to events from the U1 via klipper-router.
#
# Start with:
#   ~/klippy-env/bin/python ~/klipper/klippy.py \
#     /path/to/ace-u1-bridge/config/klipper-ace/printer.cfg \
#     -a /tmp/klippy_ace_uds \
#     -l /tmp/klippy_ace.log

# ─── Host MCU ─────────────────────────────────────────────────────────────────
# The ACE instance has no physical MCU board. Use the linux process MCU
# so Klipper has something to start against. Requires klipper_mcu running:
#   ~/klipper/scripts/klipper-mcu.py or the klipper-mcu systemd service
[mcu]
serial: /tmp/klipper_host_mcu

[printer]
kinematics: none
max_velocity: 1
max_accel: 1

# ─── Required by ACE driver and macros ────────────────────────────────────────
[respond]

[virtual_pins]

[save_variables]
filename: ~/printer_data/config/ace_saved_variables.cfg

# ─── ACE Pro driver + bridge configs ─────────────────────────────────────────
[include ace_instance.cfg]

# ─── Klipper Router API macros ───────────────────────────────────────────────
# Provides ROUTER_EVENT_TRIGGER, ROUTER_EVENT_SUBSCRIBE, etc.
# The ace_events.cfg overrides ROUTER_ON_READY/CONNECTED/DISCONNECTED
# from router_api.cfg, so include router_api.cfg FIRST.
[include ../../upstream/klipper-router/includes/router_api.cfg]

# ─── ACE-side event handlers ─────────────────────────────────────────────────
# Responds to events from U1 (ace_retract, ace_feed, ace_dry_start, etc.)
[include ../../macros/ace_events.cfg]
