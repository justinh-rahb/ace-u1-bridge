site_name: ace-u1-bridge
site_description: Integrate the Anycubic ACE Pro multi-material unit with the Snapmaker U1 four-toolhead printer via Klipper Router
site_url: https://justinh-rahb.github.io/ace-u1-bridge/
repo_url: https://github.com/justinh-rahb/ace-u1-bridge
repo_name: justinh-rahb/ace-u1-bridge
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - toc.follow

nav:
  - Home: index.md
  - Commissioning:
      - Overview: COMMISSIONING.md
      - Bowden Routing: BOWDEN_ROUTING.md
  - Design & Architecture: design.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - toc:
      permalink: true

plugins:
  - search
