# ace_bridge.cfg — U1-side ACE bridge macros
# Include this from the U1 Klipper config:
#   [include /path/to/ace-u1-bridge/macros/ace_bridge.cfg]
#
# Requires router_api.cfg to be included first (already in U1 extended config).

# ─── State tracking ────────────────────────────────────────────────────────────

[gcode_macro _ACE_BRIDGE_STATE]
variable_ace_ready: False
variable_active_lane: -1          # currently loaded ACE lane (-1 = none/unknown)
variable_mode: 'drybox'           # 'drybox' | 'lane_per_head' | '2plus2'
gcode:

# ─── Router lifecycle ──────────────────────────────────────────────────────────

[gcode_macro ROUTER_ON_READY]
description: Called by router when this instance is ready. Subscribe to ACE events.
gcode:
    RESPOND MSG="ace_bridge: registering event handlers"
    ROUTER_EVENT_SUBSCRIBE EVENT=ace_retract_done GCODE=ON_ACE_RETRACT_DONE
    ROUTER_EVENT_SUBSCRIBE EVENT=ace_feed_done    GCODE=ON_ACE_FEED_DONE
    ROUTER_EVENT_SUBSCRIBE EVENT=ace_runout       GCODE=ON_ACE_RUNOUT

[gcode_macro ROUTER_ON_CONNECTED]
description: Called when a printer connects to the router.
gcode:
    {% set printer_name = params.PRINTER|default('') %}
    {% if printer_name == 'ace' %}
        RESPOND MSG="ace_bridge: ACE instance connected"
        SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_STATE VARIABLE=ace_ready VALUE=True
        # Optionally start drying on connect
        # ACE_BRIDGE_DRY_START TEMP=45 DURATION=480
    {% endif %}

[gcode_macro ROUTER_ON_DISCONNECTED]
description: Called when a printer disconnects from the router. Fallback to drybox mode.
gcode:
    {% set printer_name = params.PRINTER|default('') %}
    {% if printer_name == 'ace' %}
        RESPOND MSG="ace_bridge: ACE instance disconnected — fallback to drybox mode"
        SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_STATE VARIABLE=ace_ready VALUE=False
    {% endif %}

# ─── ACE event callbacks (incoming from ACE instance) ─────────────────────────

[gcode_macro ON_ACE_RETRACT_DONE]
description: ACE has finished retracting filament back to park position.
gcode:
    {% set lane = params.LANE|default('-1')|int %}
    RESPOND MSG="ace_bridge: lane {lane} retracted to park"

[gcode_macro ON_ACE_FEED_DONE]
description: ACE has finished feeding filament to U1 entry point. Trigger U1 load.
gcode:
    {% set lane = params.LANE|default('-1')|int %}
    {% set extruder = params.EXTRUDER|default('-1')|int %}
    RESPOND MSG="ace_bridge: lane {lane} fed to entry — loading extruder {extruder}"
    {% if extruder >= 0 %}
        AUTO_FEEDING EXTRUDER={extruder} LOAD=1
    {% endif %}

[gcode_macro ON_ACE_RUNOUT]
description: ACE detected runout on a lane.
gcode:
    {% set lane = params.LANE|default('-1')|int %}
    RESPOND MSG="ace_bridge: runout detected on lane {lane}"
    PAUSE

# ─── U1 → ACE commands ────────────────────────────────────────────────────────

[gcode_macro ACE_BRIDGE_RETRACT]
description: Tell ACE to retract lane back to park after U1 has unloaded.
gcode:
    {% set lane   = params.LANE|default(0)|int %}
    {% set length = params.LENGTH|default(1200)|int %}
    {% set state  = printer['gcode_macro _ACE_BRIDGE_STATE'] %}
    {% if state.ace_ready %}
        ROUTER_EVENT_TRIGGER EVENT=ace_retract CONTEXT="lane={lane},length={length}"
    {% else %}
        RESPOND MSG="ace_bridge: ACE not ready, skipping retract (drybox mode)"
    {% endif %}

[gcode_macro ACE_BRIDGE_FEED]
description: Tell ACE to feed a lane to U1 entry point, then U1 will finish load.
gcode:
    {% set lane     = params.LANE|default(0)|int %}
    {% set length   = params.LENGTH|default(1200)|int %}
    {% set extruder = params.EXTRUDER|default(0)|int %}
    {% set state    = printer['gcode_macro _ACE_BRIDGE_STATE'] %}
    {% if state.ace_ready %}
        ROUTER_EVENT_TRIGGER EVENT=ace_feed CONTEXT="lane={lane},length={length},extruder={extruder}"
    {% else %}
        RESPOND MSG="ace_bridge: ACE not ready — calling AUTO_FEEDING directly"
        AUTO_FEEDING EXTRUDER={extruder} LOAD=1
    {% endif %}

[gcode_macro ACE_BRIDGE_DRY_START]
description: Start ACE drying.
gcode:
    {% set temp     = params.TEMP|default(45)|int %}
    {% set duration = params.DURATION|default(480)|int %}
    {% set state    = printer['gcode_macro _ACE_BRIDGE_STATE'] %}
    {% if state.ace_ready %}
        ROUTER_EVENT_TRIGGER EVENT=ace_dry_start CONTEXT="temp={temp},duration={duration}"
    {% else %}
        RESPOND MSG="ace_bridge: ACE not ready, cannot start drying"
    {% endif %}

[gcode_macro ACE_BRIDGE_DRY_STOP]
description: Stop ACE drying.
gcode:
    {% set state = printer['gcode_macro _ACE_BRIDGE_STATE'] %}
    {% if state.ace_ready %}
        ROUTER_EVENT_TRIGGER EVENT=ace_dry_stop
    {% endif %}

# ─── Full load/unload sequences ───────────────────────────────────────────────

[gcode_macro ACE_BRIDGE_LOAD_LANE]
description: |
    Full coordinated load: ACE feeds to entry point, then U1 AUTO_FEEDING
    pulls the rest of the way. Use in lane_per_head or 2plus2 mode.
    LANE=n  EXTRUDER=n  LENGTH=distance_ace_to_entry
gcode:
    {% set lane     = params.LANE|default(0)|int %}
    {% set extruder = params.EXTRUDER|default(0)|int %}
    {% set length   = params.LENGTH|default(1200)|int %}
    RESPOND MSG="ace_bridge: loading lane {lane} → extruder {extruder}"
    ACE_BRIDGE_FEED LANE={lane} LENGTH={length} EXTRUDER={extruder}
    # ON_ACE_FEED_DONE will trigger AUTO_FEEDING LOAD=1 asynchronously

[gcode_macro ACE_BRIDGE_UNLOAD_LANE]
description: |
    Full coordinated unload: U1 AUTO_FEEDING retracts from extruder,
    then ACE retracts the rest of the way to park.
    LANE=n  EXTRUDER=n  LENGTH=distance_ace_to_entry
gcode:
    {% set lane     = params.LANE|default(0)|int %}
    {% set extruder = params.EXTRUDER|default(0)|int %}
    {% set length   = params.LENGTH|default(1200)|int %}
    RESPOND MSG="ace_bridge: unloading extruder {extruder} → ACE lane {lane}"
    AUTO_FEEDING EXTRUDER={extruder} UNLOAD=1
    ACE_BRIDGE_RETRACT LANE={lane} LENGTH={length}

# ─── Lane routing table (2+2 mode) ────────────────────────────────────────────
# Maps logical tool numbers to ACE lanes.
# Modify to match your physical wiring.
#
# Default (lane_per_head mode):
#   T0 → ACE lane 0
#   T1 → ACE lane 1
#   T2 → ACE lane 2
#   T3 → ACE lane 3
#
# Example 2+2 mode:
#   T0 color A → ACE lane 0  |  T0 color B → ACE lane 1
#   T1 color A → ACE lane 2  |  T1 color B → ACE lane 3
#   T2, T3 single material (no ACE)

[gcode_macro _ACE_LANE_MAP]
variable_t0_lane: 0
variable_t1_lane: 1
variable_t2_lane: 2
variable_t3_lane: 3
gcode:
