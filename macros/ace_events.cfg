# ace_events.cfg — ACE instance event handlers
# Loaded on the ACE Klipper instance.
# Responds to events triggered by the U1 instance via klipper-router.

# ─── Router lifecycle ──────────────────────────────────────────────────────────

[gcode_macro ROUTER_ON_READY]
description: Subscribe to events from U1 on startup.
gcode:
    RESPOND MSG="ace_events: registering event handlers"
    ROUTER_EVENT_SUBSCRIBE EVENT=ace_retract    GCODE=ON_ACE_RETRACT_CMD
    ROUTER_EVENT_SUBSCRIBE EVENT=ace_feed       GCODE=ON_ACE_FEED_CMD
    ROUTER_EVENT_SUBSCRIBE EVENT=ace_dry_start  GCODE=ON_ACE_DRY_START_CMD
    ROUTER_EVENT_SUBSCRIBE EVENT=ace_dry_stop   GCODE=ON_ACE_DRY_STOP_CMD

[gcode_macro ROUTER_ON_CONNECTED]
gcode:
    {% set printer_name = params.PRINTER|default('') %}
    {% if printer_name == 'u1' %}
        RESPOND MSG="ace_events: U1 connected"
    {% endif %}

[gcode_macro ROUTER_ON_DISCONNECTED]
gcode:
    {% set printer_name = params.PRINTER|default('') %}
    {% if printer_name == 'u1' %}
        RESPOND MSG="ace_events: U1 disconnected — drying continues if active"
    {% endif %}

# ─── Command handlers (called by router event delivery) ───────────────────────

[gcode_macro ON_ACE_RETRACT_CMD]
description: U1 has unloaded to extruder exit. Retract ACE lane to park.
gcode:
    {% set lane   = params.LANE|default(0)|int %}
    {% set length = params.LENGTH|default(1200)|int %}
    RESPOND MSG="ace_events: retracting lane {lane} by {length}mm"
    ACE_RETRACT INDEX={lane} LENGTH={length}
    # Notify U1 that retract is complete
    ROUTER_EVENT_TRIGGER EVENT=ace_retract_done CONTEXT="lane={lane}"

[gcode_macro ON_ACE_FEED_CMD]
description: U1 requests ACE to feed a lane to entry point.
gcode:
    {% set lane     = params.LANE|default(0)|int %}
    {% set length   = params.LENGTH|default(1200)|int %}
    {% set extruder = params.EXTRUDER|default(0)|int %}
    RESPOND MSG="ace_events: feeding lane {lane} by {length}mm"
    ACE_FEED INDEX={lane} LENGTH={length}
    # Notify U1 that feed is complete — U1 will then run AUTO_FEEDING LOAD=1
    ROUTER_EVENT_TRIGGER EVENT=ace_feed_done CONTEXT="lane={lane},extruder={extruder}"

[gcode_macro ON_ACE_DRY_START_CMD]
description: Start ACE drying at requested temperature and duration.
gcode:
    {% set temp     = params.TEMP|default(45)|int %}
    {% set duration = params.DURATION|default(480)|int %}
    RESPOND MSG="ace_events: starting drying at {temp}C for {duration}min"
    ACE_START_DRYING TEMP={temp} DURATION={duration}

[gcode_macro ON_ACE_DRY_STOP_CMD]
description: Stop ACE drying.
gcode:
    RESPOND MSG="ace_events: stopping drying"
    ACE_STOP_DRYING

# ─── ACE runout → notify U1 ───────────────────────────────────────────────────

# Wire your runout sensor's runout_gcode to call this:
#   runout_gcode: ACE_RUNOUT_NOTIFY LANE=0
[gcode_macro ACE_RUNOUT_NOTIFY]
description: Forward runout event to U1.
gcode:
    {% set lane = params.LANE|default(0)|int %}
    RESPOND MSG="ace_events: runout on lane {lane}, notifying U1"
    ROUTER_EVENT_TRIGGER EVENT=ace_runout CONTEXT="lane={lane}"
